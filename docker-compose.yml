services:
  db:
    image: postgres:16
    container_name: task_queue_db
    environment:
      POSTGRES_DB: task_queue_api
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: task_queue_app
    depends_on:
      - db
    environment:
      DATABASE_URL: "dbname=task_queue_api user=postgres password=postgres host=db port=5432"
      SECRET_KEY: "docker-dev-secret-key"
    ports:
      - "5000:5000"
    command: python app.py

  worker:
    build: .
    container_name: task_queue_worker
    depends_on:
      - db
    environment:
      DATABASE_URL: "dbname=task_queue_api user=postgres password=postgres host=db port=5432"
      SECRET_KEY: "docker-dev-secret-key"
    command: python worker.py

volumes:
  postgres_data: